<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monje Negro - Catálogo</title>
    <style>
        @font-face { font-family: 'AM Tripoli'; src: url('AMTripoli-Regular.ttf'); }
        @font-face { font-family: 'Monley'; src: url('MonleyRegular.Ttf'); }

        :root { --rojo: #ed1c24; --negro: #0a0a0a; --gris: #1a1a1a; }
        body { background-color: var(--negro); color: white; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding-bottom: 120px; }
        
        header { background: black; padding: 25px 20px; text-align: center; border-bottom: 3px solid var(--rojo); }
        .brand { color: var(--rojo); font-family: 'AM Tripoli', sans-serif; font-size: 3.2em; margin: 0; text-transform: uppercase; line-height: 1; }
        .sub { color: white; font-family: 'Monley', cursive; font-size: 1.8em; margin-top: -5px; display: block; text-transform: lowercase; }

        .container { padding: 15px; max-width: 1000px; margin: auto; }

        /* Área de búsqueda y filtros */
        .filtros-area { background: #000; padding: 15px 0; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #222; }
        
        /* Estilos del Buscador */
        .search-container { margin-bottom: 15px; position: relative; }
        #buscador {
            width: 100%;
            padding: 12px 15px;
            background: #111;
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            font-size: 1em;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }
        #buscador:focus { border-color: var(--rojo); box-shadow: 0 0 10px rgba(237, 28, 36, 0.2); }

        .filtro-label { font-size: 0.7em; color: #666; text-transform: uppercase; margin: 8px 0 5px 0; display: block; letter-spacing: 1px; font-weight: bold; }
        .filtro-grupo { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; scrollbar-width: none; }
        .filtro-grupo::-webkit-scrollbar { display: none; }
        
        .btn-filtro { background: #222; color: #aaa; border: 1px solid #333; padding: 8px 16px; border-radius: 5px; cursor: pointer; white-space: nowrap; font-size: 0.85em; transition: 0.3s; }
        .btn-filtro.active { background: var(--rojo); color: white; border-color: var(--rojo); font-weight: bold; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .producto { background: var(--gris); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; display: flex; flex-direction: column; }
        .producto img { width: 100%; height: 180px; object-fit: contain; margin-bottom: 12px; }
        
        .nombre { font-weight: bold; font-size: 0.95em; min-height: 38px; margin-bottom: 8px; line-height: 1.2; }
        .precio { color: #fff; font-size: 1.2em; font-weight: bold; margin-bottom: 12px; }

        .selector-cantidad { display: flex; align-items: center; justify-content: center; background: #000; border-radius: 6px; border: 1px solid #333; margin-bottom: 8px; }
        .btn-qty { background: #222; color: white; border: none; padding: 8px 12px; cursor: pointer; width: 40px; font-weight: bold; }
        .input-qty { background: transparent; color: white; border: none; width: 40px; text-align: center; font-weight: bold; }

        .btn-add { background: var(--rojo); color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; text-transform: uppercase; font-size: 0.75em; }

        #cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 380px; background: #25d366; color: white; padding: 16px; text-align: center; font-weight: bold; text-decoration: none; border-radius: 12px; display: none; z-index: 100; box-shadow: 0 8px 25px rgba(0,0,0,0.7); }
    </style>
</head>
<body>

<header>
    <h1 class="brand">MONJE NEGRO</h1>
    <span class="sub">botilleria</span>
</header>

<div class="filtros-area">
    <div class="container">
        <div class="search-container">
            <input type="text" id="buscador" placeholder="Buscar producto (ej: Malbec, Rutini...)" oninput="handleSearch()">
        </div>

        <span class="filtro-label">1. Categoría</span>
        <div id="filtros-tipo" class="filtro-grupo"></div>
        
        <div id="seccion-cepas" style="display:none;">
            <span class="filtro-label">2. Variedad / Cepa</span>
            <div id="filtros-cepa" class="filtro-grupo"></div>
        </div>
    </div>
</div>

<div class="container">
    <div id="loading" style="text-align: center; color: #ed1c24; padding-top: 50px;">Abriendo la cava...</div>
    <div id="catalogo-grid" class="grid"></div>
</div>

<a href="#" id="cart-bar" onclick="sendWpp()">
    🛒 VER PEDIDO POR WHATSAPP (<span id="count">0</span>)
</a>

<script>
    const EXCEL_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRh5hj_V9tKP0pltPLCB8WMDw2f6L0DkKUWx0adnDXkWPVCqsqR-hOMFLPBKq6DIceIM2o7Pz-Z0COM/pub?output=csv';
    const WHATSAPP_NUMBER = "5493512345678"; 

    const TIPOS = ["Todos", "Ofertas", "Vino Tinto", "Vino Blanco", "Espumante", "Vino Rosado", "Otras Bebidas"];
    const CEPAS = {
        "Vino Tinto": ["Todos", "Malbec", "Cabernet Franc", "Merlot", "Syrah", "Tempranillo", "Cabernet Sauvignon", "Pinot Noir", "Blend"],
        "Vino Blanco": ["Todos", "Dulce", "Sauvignon Blanc", "Torrontes", "Chardonnay", "Semillon"],
        "Espumante": ["Todos", "Extra Brut", "Brut Nature", "Rose", "Dulce"],
        "Vino Rosado": ["Todos", "Malbec", "Syrah", "Blend"]
    };

    let allProducts = [];
    let cart = [];
    let fTipo = 'Todos';
    let fCepa = 'Todos';
    let searchTerm = '';

    const normalizar = (texto) => {
        return texto.toString().toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
            .trim();
    };

    async function fetchProducts() {
        try {
            const res = await fetch(EXCEL_URL + '&t=' + new Date().getTime());
            const text = await res.text();
            const rows = text.split('\n').slice(1);
            
            allProducts = rows.map(r => {
                const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (c.length < 5) return null;
                const clean = (v) => v ? v.replace(/"/g, '').trim() : '';
                return {
                    name: clean(c[0]), 
                    price: clean(c[1]), 
                    img: clean(c[3]) || 'https://via.placeholder.com/200',
                    tipo: clean(c[4]), 
                    cepa: clean(c[5])
                };
            }).filter(p => p && p.name !== "");

            renderFiltros();
            renderProducts();
            document.getElementById('loading').style.display = 'none';
        } catch (e) { console.error(e); }
    }

    function renderFiltros() {
        document.getElementById('filtros-tipo').innerHTML = TIPOS.map(t => 
            `<button class="btn-filtro ${t===fTipo?'active':''}" onclick="setFiltro('tipo','${t}')">${t}</button>`).join('');
        
        const seccionCepas = document.getElementById('seccion-cepas');
        if (CEPAS[fTipo]) {
            seccionCepas.style.display = "block";
            document.getElementById('filtros-cepa').innerHTML = CEPAS[fTipo].map(c => 
                `<button class="btn-filtro ${c===fCepa?'active':''}" onclick="setFiltro('cepa','${c}')">${c}</button>`).join('');
        } else {
            seccionCepas.style.display = "none";
        }
    }

    function handleSearch() {
        searchTerm = normalizar(document.getElementById('buscador').value);
        renderProducts();
    }

    function setFiltro(cat, val) {
        if(cat === 'tipo') { fTipo = val; fCepa = 'Todos'; }
        else { fCepa = val; }
        renderFiltros();
        renderProducts();
    }

    function updateQty(btn, delta) {
        const input = btn.parentElement.querySelector('input');
        let val = parseInt(input.value) + delta;
        if (val < 1) val = 1;
        input.value = val;
    }

    function renderProducts() {
        const grid = document.getElementById('catalogo-grid');
        grid.innerHTML = '';

        const filtered = allProducts.filter(p => {
            const matchTipo = fTipo === 'Todos' || normalizar(p.tipo) === normalizar(fTipo);
            const matchCepa = fCepa === 'Todos' || normalizar(p.cepa) === normalizar(fCepa);
            const matchSearch = searchTerm === '' || normalizar(p.name).includes(searchTerm);
            return matchTipo && matchCepa && matchSearch;
        });

        if (filtered.length === 0) {
            grid.innerHTML = `<p style="grid-column:1/-1; text-align:center; padding:40px; color:#666;">No se encontraron productos.</p>`;
        }

        filtered.forEach((p, index) => {
            grid.innerHTML += `
                <div class="producto">
                    <img src="${p.img}">
                    <span class="nombre">${p.name}</span>
                    <span class="precio">$${p.price}</span>
                    <div class="selector-cantidad">
                        <button class="btn-qty" onclick="updateQty(this, -1)">-</button>
                        <input type="number" class="input-qty" value="1" id="qty-${index}" readonly>
                        <button class="btn-qty" onclick="updateQty(this, 1)">+</button>
                    </div>
                    <button class="btn-add" onclick="addItem('${p.name}', '${p.price}', 'qty-${index}')">Añadir</button>
                </div>`;
        });
    }

    function addItem(n, p, id) {
        const qty = parseInt(document.getElementById(id).value);
        const item = cart.find(i => i.n === n);
        if (item) item.q += qty; else cart.push({n, p, q: qty});
        document.getElementById(id).value = 1;
        const total = cart.reduce((acc, i) => acc + i.q, 0);
        document.getElementById('cart-bar').style.display = 'block';
        document.getElementById('count').innerText = total;
    }

    function sendWpp() {
        let msg = "¡Hola Monje Negro! 🍷 Pedido de catálogo:%0A%0A";
        let tot = 0;
        cart.forEach(i => {
            const precio = parseFloat(i.p.replace(/\./g, '').replace(',', '.')) || 0;
            tot += (precio * i.q);
            msg += `• ${i.q}x ${i.n} ($${i.p} c/u)%0A`;
        });
        msg += `%0A*TOTAL ESTIMADO: $${tot.toLocaleString('es-AR')}*`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${msg}`, '_blank');
    }
    fetchProducts();
</script>
</body>
</html>
