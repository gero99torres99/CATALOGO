<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monje Negro - Catálogo</title>
    <style>
        body { background-color: #050505; color: white; font-family: 'Helvetica', sans-serif; margin: 0; padding-bottom: 100px; }
        header { background: #000; padding: 30px; text-align: center; border-bottom: 3px solid #ed1c24; }
        .brand { color: #ed1c24; font-size: 2.5em; font-weight: bold; margin: 0; text-transform: uppercase; }
        .sub { color: #fff; font-size: 1em; letter-spacing: 3px; }
        
        .container { padding: 20px; max-width: 600px; margin: auto; }
        .seccion-titulo { border-left: 4px solid #ed1c24; padding-left: 10px; margin: 30px 0 20px; text-transform: uppercase; }

        .producto { background: #1a1a1a; display: flex; align-items: center; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #333; }
        .info { flex-grow: 1; }
        .nombre { font-weight: bold; font-size: 1.1em; display: block; }
        .precio { color: #ed1c24; font-size: 1.2em; font-weight: bold; }
        
        .btn-add { background: #ed1c24; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #25d366; color: white; padding: 20px; text-align: center; font-weight: bold; text-decoration: none; display: none; font-size: 1.2em; box-shadow: 0 -5px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header>
    <h1 class="brand">MONJE NEGRO</h1>
    <div class="sub">BOTILLERÍA</div>
</header>

<div class="container">
    <h2 class="seccion-titulo">Mes del Malbec 🍷</h2>
    
    <div class="producto">
        <div class="info">
            <span class="nombre">El Enemigo Malbec</span>
            <span class="precio">$23.600</span>
        </div>
        <button class="btn-add" onclick="addItem('El Enemigo Malbec', 25500)">AÑADIR</button>
    </div>

    <div class="producto">
        <div class="info">
            <span class="nombre">DV Catena Malbec</span>
            <span class="precio">$22.000</span>
        </div>
        <button class="btn-add" onclick="addItem('DV Catena Malbec', 22000)">AÑADIR</button>
    </div>
</div>

<a href="#" id="cart-bar" onclick="sendWpp()">
    PEDIR POR WHATSAPP (<span id="count">0</span>)
</a>

<script>
   const EXCEL_URL = https://docs.google.com/spreadsheets/d/e/2PACX-1vRh5hj_V9tKP0pltPLCB8WMDw2f6L0DkKUWx0adnDXkWPVCqsqR-hOMFLPBKq6DIceIM2o7Pz-Z0COM/pubhtml;

    let cart = [];

    async function fetchProducts() {
        try {
            const response = await fetch(EXCEL_URL);
            const data = await response.text();
            const rows = data.split('\n').slice(1); // Salta la primera fila de títulos
            const grid = document.getElementById('catalogo-grid');
            grid.innerHTML = '';

            rows.forEach(row => {
                const cols = row.split(','); // Divide por comas
                if (cols.length >= 2) {
                    const name = cols[0];
                    const price = cols[1];
                    const category = cols[2];
                    const img = cols[3] || 'https://via.placeholder.com/150';

                    grid.innerHTML += `
                        <div class="producto">
                            <img src="${img}" alt="${name}">
                            <span class="nombre">${name}</span>
                            <span class="precio">$${price}</span>
                            <button class="btn-add" onclick="addItem('${name}', '${price}')">AÑADIR</button>
                        </div>
                    `;
                }
            });
        } catch (e) {
            console.error("Error cargando el Excel", e);
        }
    }

    function addItem(name, price) {
        cart.push({name, price});
        document.getElementById('cart-bar').style.display = 'block';
        document.getElementById('count').innerText = cart.length;
    }

    function sendWpp() {
        let phone = "549351XXXXXXX"; // TU CELULAR ACÁ
        let text = "¡Hola Monje Negro! 🍷 Quiero encargar:%0A";
        cart.forEach(item => { text += `- ${item.name} ($${item.price})%0A`; });
        window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    }

    fetchProducts();
</script>
</body>
</html>
